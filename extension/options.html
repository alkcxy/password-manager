<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Manager — Opzioni</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 24px;
      max-width: 480px;
    }
    h1 { font-size: 1.2rem; margin-bottom: 20px; }
    label { display: block; margin-bottom: 6px; font-weight: bold; }
    input[type="url"] {
      width: 100%;
      padding: 8px;
      font-size: 1rem;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    input[type="url"].error { border-color: #c00; }
    #error-msg {
      color: #c00;
      font-size: 0.875rem;
      margin-top: 6px;
      min-height: 1.2em;
    }
    button {
      margin-top: 12px;
      padding: 8px 20px;
      font-size: 1rem;
      cursor: pointer;
    }
    #status {
      margin-top: 10px;
      color: green;
      font-size: 0.875rem;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <h1>Impostazioni Password Manager</h1>
  <label for="base-url">URL della tua istanza</label>
  <input type="url" id="base-url" placeholder="https://pm.example.com">
  <div id="error-msg"></div>
  <button id="save-btn">Salva</button>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
